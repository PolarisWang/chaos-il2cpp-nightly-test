events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format with cache status
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Gzip for HTML reports
    gzip on;
    gzip_types text/html text/css application/json application/javascript;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;

        # Directory index
    index index.html;

        # Allure reports — /allure/<build-number>/
        location /allure/ {
            alias /usr/share/nginx/html/allure/;
            autoindex on;
            autoindex_localtime on;
        }

        # Daily reports — /daily/<yyyymmdd>.html
        location /daily/ {
            alias /reports/daily/;
            autoindex on;
            autoindex_localtime on;
            autoindex_format html;
            disable_symlinks off;
        }

        # SonarQube proxy (if SonarQube is on same Docker network)
        location /sonar/ {
            proxy_pass http://sonarqube:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Latest report redirect
        location /latest {
            return 302 /daily/nightly-latest.html;
        }

        # Health check
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # API reverse proxy (FastAPI)
        location /api/ {
            proxy_pass http://report-api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }
}
