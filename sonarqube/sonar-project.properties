# chaos-il2cpp SonarQube Scanner Configuration
# Used by SonarScanner CLI on each CI agent

# Project identity
sonar.projectKey=chaos-il2cpp
sonar.projectName=chaos-il2cpp
sonar.projectVersion=1.0

# Source code location (relative to booming-il2cpp repo root)
sonar.sources=.
sonar.exclusions=**/extern/**/*,**/3rdparty/**/*,**/build/**/*

# C/C++ analysis (SonarCFamily requires developer edition; community edition falls back to generic)
sonar.language=cpp
sonar.cxx.builtIncludes=artifacts/presets/*/include

# Test coverage (if using gcov/lcov)
sonar.cxx.gcov.reportPaths=artifacts/coverage/**/*.gcov
sonar.cxx.coverage.reportPath=artifacts/coverage/lcov.info

# Test reports (JUnit XML format from ctest)
sonar.junit.reportPaths=artifacts/**/*-test-report.xml

# Quality gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Encoding
sonar.sourceEncoding=UTF-8
