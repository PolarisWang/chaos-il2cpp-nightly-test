jenkins:
  systemMessage: "chaos-il2cpp Nightly Build Pipeline — Multi-Platform Quality Monitoring"

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID}"
          password: "${JENKINS_ADMIN_PASSWORD}"
          name: "Admin"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  remotingSecurity:
    enabled: true

  slaveAgentPort: 50000
  numExecutors: 0

tool:
  git:
    installations:
      - name: "Default"
        home: "/usr/bin/git"
        properties:
          - installSource:
              installers:
                - command:
                    command: "git --version"

unclassified:
  location:
    url: "http://chaos-master:8080/"

  # ================================================================
  # Global Pipeline Libraries
  # ================================================================
  globalLibraries:
    libraries:
      - name: "chaos-pipelines"
        defaultVersion: "main"
        implicit: false
        allowVersionOverride: true
        includeInChangesets: false
        retriever:
          modernSCM:
            scm:
              git:
                remote: "https://github.com/PolarisWang/chaos-il2cpp-nightly-test.git"
                credentialsId: ""
                traits:
                  - gitBranchDiscovery
                  - pruneStaleBranch
            libraryPath: "pipelines"

  # ================================================================
  # SonarQube Integration
  # ================================================================
  sonarGlobalConfiguration:
    buildWrapperEnabled: false
    installations:
      - name: "SonarQube"
        serverUrl: "${SONAR_HOST_URL}"
        credentialsId: "sonarqube-token"
        triggerOnScannFail: false
        triggerOnlyOnBuildSuccess: true

  # ================================================================
  # Allure Global Configuration
  # ================================================================
  allureGlobalConfiguration:
    installations:
      - name: "AllureDefault"
        properties:
          - installSource:
              installers:
                - command:
                    command: |
                      ALLURE_VERSION=2.30.0
                      curl -sSL https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz | tar xz -C /tmp
                      mv /tmp/allure-${ALLURE_VERSION} /opt/allure
                      ln -sf /opt/allure/bin/allure /usr/local/bin/allure
