networks:
  jenkins:
    driver: bridge

volumes:
  jenkins-home:
  jenkins-casc:
  postgresql-data:
  sonarqube-data:
  sonarqube-extensions:
  report-data:

services:
  # ================================================================
  # Jenkins Master
  # ================================================================
  master:
    build:
      context: .
      dockerfile: jenkins/Dockerfile
    image: chaos-jenkins-master:latest
    container_name: chaos-master
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/usr/share/jenkins/ref/jenkins.yaml
      - JENKINS_ADMIN_ID=${JENKINS_ADMIN_ID:-qa004}
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD:-abcd@1234}
      - JENKINS_AGENT_JNLP_PORT=50000
      - JENKINS_MASTER_URL=http://chaos-master:8080
      - JENKINS_URL=http://chaos-master:8080
      # SonarQube integration
      - SONAR_HOST_URL=http://sonarqube:9000
      - SONAR_TOKEN=${SONAR_TOKEN:-}
      # Feishu notification
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-}
    volumes:
      - jenkins-home:/var/jenkins_home
      - ./jenkins/jenkins.yaml:/usr/share/jenkins/ref/jenkins.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/debian/agent/booming-il2cpp:/booming-il2cpp:ro
    networks:
      - jenkins
    restart: unless-stopped

  # ================================================================
  # Jenkins Agents (Containerized)
  # ================================================================
  linux-x64-agent:
    build:
      context: ./docker/linux-x64-agent
    image: chaos-agent-linux-x64:latest
    container_name: chaos-agent-x64
    environment:
      - JENKINS_MASTER_URL=http://chaos-master:8080
      - JENKINS_AGENT_NAME=linux-x64
      - JENKINS_AGENT_SECRET=
      - AGENT_LABELS=linux x64 native
      - SONAR_HOST_URL=http://sonarqube:9000
      - SONAR_TOKEN=${SONAR_TOKEN:-}
    volumes:
      - /home/debian/agent/booming-il2cpp:/booming-il2cpp:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins
    depends_on:
      - master
    restart: unless-stopped

  linux-arm64-agent:
    build:
      context: ./docker/linux-arm64-agent
    image: chaos-agent-linux-arm64:latest
    container_name: chaos-agent-arm64
    environment:
      - JENKINS_MASTER_URL=http://chaos-master:8080
      - JENKINS_AGENT_NAME=linux-arm64
      - JENKINS_AGENT_SECRET=
      - AGENT_LABELS=linux arm64 qemu
      - SONAR_HOST_URL=http://sonarqube:9000
      - SONAR_TOKEN=${SONAR_TOKEN:-}
    volumes:
      - /home/debian/agent/booming-il2cpp:/booming-il2cpp:ro
    networks:
      - jenkins
    depends_on:
      - master
    restart: unless-stopped

  android-arm64-agent:
    build:
      context: ./docker/android-arm64-agent
    image: chaos-agent-android-arm64:latest
    container_name: chaos-agent-android
    environment:
      - JENKINS_MASTER_URL=http://chaos-master:8080
      - JENKINS_AGENT_NAME=android-arm64
      - JENKINS_AGENT_SECRET=
      - AGENT_LABELS=android arm64 ndk
      - SONAR_HOST_URL=http://sonarqube:9000
      - SONAR_TOKEN=${SONAR_TOKEN:-}
    volumes:
      - /home/debian/agent/booming-il2cpp:/booming-il2cpp:ro
    networks:
      - jenkins
    depends_on:
      - master
    restart: unless-stopped

  # ================================================================
  # SonarQube (Code Quality)
  # ================================================================
  postgresql:
    image: postgres:15-alpine
    container_name: chaos-sonar-db
    networks:
      - jenkins
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar_pass
      - POSTGRES_DB=sonarqube
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:lts-community
    container_name: chaos-sonarqube
    networks:
      - jenkins
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://postgresql:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar_pass
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped

  # ================================================================
  # Report Server (Allure + Daily Reports)
  # ================================================================
  report-server:
    build:
      context: ./report-server
    image: chaos-report-server:latest
    container_name: chaos-report-server
    networks:
      - jenkins
    ports:
      - "8081:80"
    volumes:
      - report-data:/usr/share/nginx/html
    depends_on:
      - sonarqube
    restart: unless-stopped
