networks:
  jenkins:
    driver: bridge

volumes:
  jenkins-home:
  jenkins-casc:
  postgresql-data:
  sonarqube-data:
  sonarqube-extensions:
  report-data:

services:
  # ================================================================
  # Jenkins Master
  # ================================================================
  master:
    build:
      context: .
      dockerfile: jenkins/Dockerfile
    image: chaos-jenkins-master:latest
    container_name: chaos-master
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/usr/share/jenkins/ref/jenkins.yaml
      - JENKINS_ADMIN_ID=${JENKINS_ADMIN_ID:-qa004}
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD:-abcd@1234}
      - JENKINS_AGENT_JNLP_PORT=50000
      - JENKINS_MASTER_URL=http://chaos-master:8080
      - JENKINS_URL=http://chaos-master:8080
      # SonarQube integration
      - SONAR_HOST_URL=http://sonarqube:9000
      - SONAR_TOKEN=${SONAR_TOKEN:-}
      # Feishu notification
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-}
    volumes:
      - jenkins-home:/var/jenkins_home
      - ./jenkins/jenkins.yaml:/usr/share/jenkins/ref/jenkins.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/debian/agent/booming-il2cpp:/booming-il2cpp:ro
    networks:
      - jenkins
    restart: unless-stopped

  # ================================================================
  # Jenkins Agents (Containerized)
  # ================================================================
  linux-x64-agent:
    build:
      context: ./docker
      dockerfile: linux-x64-agent/Dockerfile
    image: chaos-agent-linux-x64:latest
    container_name: chaos-agent-x64
    environment:
      - JENKINS_MASTER_URL=http://chaos-master:8080
      - JENKINS_AGENT_NAME=linux-x64
      - JENKINS_AGENT_SECRET=
      - AGENT_LABELS=linux x64 native
      - SONAR_HOST_URL=http://sonarqube:9000
      - SONAR_TOKEN=${SONAR_TOKEN:-}
      - MINIO_ENDPOINT=http://chaos-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - /home/debian/agent/booming-il2cpp:/booming-il2cpp:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins
    depends_on:
      - master
    restart: unless-stopped

  linux-arm64-agent:
    build:
      context: ./docker
      dockerfile: linux-arm64-agent/Dockerfile
    image: chaos-agent-linux-arm64:latest
    container_name: chaos-agent-arm64
    environment:
      - JENKINS_MASTER_URL=http://chaos-master:8080
      - JENKINS_AGENT_NAME=linux-arm64
      - JENKINS_AGENT_SECRET=
      - AGENT_LABELS=linux arm64 qemu
      - SONAR_HOST_URL=http://sonarqube:9000
      - SONAR_TOKEN=${SONAR_TOKEN:-}
    volumes:
      - /home/debian/agent/booming-il2cpp:/booming-il2cpp:ro
    networks:
      - jenkins
    depends_on:
      - master
    restart: unless-stopped

  android-arm64-agent:
    build:
      context: ./docker
      dockerfile: android-arm64-agent/Dockerfile
    image: chaos-agent-android-arm64:latest
    container_name: chaos-agent-android
    environment:
      - JENKINS_MASTER_URL=http://chaos-master:8080
      - JENKINS_AGENT_NAME=android-arm64
      - JENKINS_AGENT_SECRET=
      - AGENT_LABELS=android arm64 ndk
      - SONAR_HOST_URL=http://sonarqube:9000
      - SONAR_TOKEN=${SONAR_TOKEN:-}
    volumes:
      - /home/debian/agent/booming-il2cpp:/booming-il2cpp:ro
    networks:
      - jenkins
    depends_on:
      - master
    restart: unless-stopped

  # ================================================================
  # Report Server (Nginx + Allure + Daily Reports)
  # ================================================================
  report-server:
    build:
      context: ./report-server
      dockerfile: Dockerfile
    image: chaos-report-server:latest
    container_name: chaos-report-server
    networks:
      - jenkins
    ports:
      - "8081:80"
    volumes:
      - /var/lib/report-server/daily:/reports/daily
      - ./report-server/src:/usr/share/nginx/html:ro
    depends_on:
      - report-api
    restart: unless-stopped

  # ================================================================
  # Report API (FastAPI + SQLite — trends, search, comparison)
  # ================================================================
  report-api:
    build:
      context: ./report-server
      dockerfile: api/Dockerfile
    image: chaos-report-api:latest
    container_name: chaos-report-api
    networks:
      - jenkins
    expose:
      - "8000"
    environment:
      - MINIO_ENDPOINT=http://chaos-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - /var/lib/report-server/db:/var/lib/report-server/db
      - /var/lib/report-server/daily:/reports/daily:ro
    restart: unless-stopped

  # ================================================================
  # MinIO S3 — Object Storage for Raw Artifacts
  # ================================================================
  minio:
    image: minio/minio:latest
    container_name: chaos-minio
    networks:
      - jenkins
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - report-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO bucket setup (runs once after MinIO starts)
  minio-setup:
    image: minio/mc:latest
    container_name: chaos-minio-setup
    networks:
      - jenkins
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      sleep 2 &&
      mc alias set local http://chaos-minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
      mc mb -p local/nightly-raw &&
      mc mb -p local/nightly-export &&
      echo 'MinIO buckets created successfully' &&
      exit 0
      "
    restart: "no"
